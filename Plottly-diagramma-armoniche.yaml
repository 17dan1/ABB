type: custom:plotly-graph
raw_plotly_config: true
refresh_interval: 2
entities:
  - entity: null
    type: bar
    name: L1
    marker:
      color: blue
    "y":
      - >-
        $fn ({hass}) =>
        Number(hass.states['sensor.abb_armonic_voltage_l1_2nd'].state)
      - >-
        $fn ({hass}) =>
        Number(hass.states['sensor.abb_armonic_voltage_l1_3rd'].state)
      - >-
        $fn ({hass}) =>
        Number(hass.states['sensor.abb_armonic_voltage_l1_4th'].state)
      - >-
        $fn ({hass}) =>
        Number(hass.states['sensor.abb_armonic_voltage_l1_5th'].state)
      - >-
        $fn ({hass}) =>
        Number(hass.states['sensor.abb_armonic_voltage_l1_6th'].state)
      - >-
        $fn ({hass}) =>
        Number(hass.states['sensor.abb_armonic_voltage_l1_7th'].state)
  - entity: null
    type: bar
    name: L2
    marker:
      color: lawngreen
    "y":
      - >-
        $fn ({hass}) =>
        Number(hass.states['sensor.abb_armonic_voltage_l2_2nd'].state)
      - >-
        $fn ({hass}) =>
        Number(hass.states['sensor.abb_armonic_voltage_l2_3rd'].state)
      - >-
        $fn ({hass}) =>
        Number(hass.states['sensor.abb_armonic_voltage_l2_4th'].state)
      - >-
        $fn ({hass}) =>
        Number(hass.states['sensor.abb_armonic_voltage_l2_5th'].state)
      - >-
        $fn ({hass}) =>
        Number(hass.states['sensor.abb_armonic_voltage_l2_6th'].state)
      - >-
        $fn ({hass}) =>
        Number(hass.states['sensor.abb_armonic_voltage_l2_7th'].state)
  - entity: null
    type: bar
    name: L3
    marker:
      color: red
    "y":
      - >-
        $fn ({hass}) =>
        Number(hass.states['sensor.abb_armonic_voltage_l3_2nd'].state)
      - >-
        $fn ({hass}) =>
        Number(hass.states['sensor.abb_armonic_voltage_l3_3rd'].state)
      - >-
        $fn ({hass}) =>
        Number(hass.states['sensor.abb_armonic_voltage_l3_4th'].state)
      - >-
        $fn ({hass}) =>
        Number(hass.states['sensor.abb_armonic_voltage_l3_5th'].state)
      - >-
        $fn ({hass}) =>
        Number(hass.states['sensor.abb_armonic_voltage_l3_6th'].state)
      - >-
        $fn ({hass}) =>
        Number(hass.states['sensor.abb_armonic_voltage_l3_7th'].state)
layout:
  title: Spettro armoniche L1
  xaxis:
    title: Armoniche
    tickvals:
      - 0
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
    ticktext:
      - 2°
      - 3°
      - 4°
      - 5°
      - 6°
      - 7°
  yaxis:
    title: THD %
    rangemode: tozero
grid_options:
  columns: 18
  rows: 8
