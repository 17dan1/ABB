type: custom:plotly-graph
entities:
  - entity: sensor.abb_l1_active_energy_meter
    unit_of_measurement: kWh
    type: bar
    marker:
      color: blue
    statistic: sum
    period: hour
  - entity: sensor.abb_l2_active_energy_meter
    unit_of_measurement: kWh
    type: bar
    marker:
      color: lawngreen
    statistic: sum
    period: hour
  - entity: sensor.abb_l3_active_energy_meter
    unit_of_measurement: kWh
    type: bar
    marker:
      color: red
    statistic: sum
    period: hour
  - entity: ""
    name: Now
    yaxis: y9
    showlegend: false
    line:
      width: 1
      dash: dot
      color: deepskyblue
    x: $ex [Date.now(), Date.now()]
    "y":
      - 0
      - 1
refresh_interval: 10
title: ENERGIA ATTIVA
grid_options:
  columns: 36
  rows: 6
min_y_axis: 0
fit_y_data: true
hours_to_show: 24h
time_offset: 2h
fn: |
  $fn({ getFromConfig, vars, data }) => {

    vars.zoom = (label, h) => ({
      args: [
        {
          layout: {
            "xaxis.range": [Date.now()-1000*60*60*h, Date.now()+2000*60*60],
          }
        }
      ],
      label,
      method: "animate",
    });
  }
config:
  scrollZoom: false
layout:
  dragmode: false
  yaxis:
    autorange: true
  barmode: stack
  updatemenus:
    - buttons:
        - $fn(({vars}) => vars.zoom('8h', 8))
        - $fn({vars}) => vars.zoom( '1d', 24)
        - $fn({vars}) => vars.zoom( '2d', 24*2)
        - $fn({vars}) => vars.zoom( '7d', 24*7)
      direction: left
      active: -1
      pad:
        r: 10
        t: 0
      type: buttons
      x: 1
      xanchor: right
      "y": 1
      yanchor: top
