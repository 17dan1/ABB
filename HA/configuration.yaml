
# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

# Includo in file di configurazione della comuncazione ModBus
modbus: !include modbus.yaml

# Utility meter energia
utility_meter:
  # Active energy
  abb_l1_active_energy_meter:
    name: ABB L1 Active Energy Meter
    unique_id: abb_l1_active_energy_meter
    source: sensor.abb_active_energy_l1
    cycle: daily
    periodically_resetting: true
    net_consumption: false
    delta_values: false
  abb_l2_active_energy_meter:
    name: ABB L2 Active Energy Meter
    unique_id: abb_l2_active_energy_meter
    source: sensor.abb_active_energy_l2
    cycle: daily
    periodically_resetting: true
    net_consumption: false
    delta_values: false
  abb_l3_active_energy_meter:
    name: ABB L3 Active Energy Meter
    unique_id: abb_l3_active_energy_meter
    source: sensor.abb_active_energy_l3
    cycle: daily
    periodically_resetting: true
    net_consumption: false
    delta_values: false
    
 # Reactive energy
  abb_l1_reactive_energy_meter:
    name: ABB L1 Reactive Energy Meter
    source: sensor.abb_reactive_energy_l1
    unique_id: abb_l1_reactive_energy_meter
    cycle: daily
    periodically_resetting: true
    net_consumption: false
    delta_values: false
  abb_l2_reactive_energy_meter:
    name: ABB L2 Reactive Energy Meter
    source: sensor.abb_reactive_energy_l2
    unique_id: abb_l2_reactive_energy_meter
    cycle: daily
    periodically_resetting: true
    net_consumption: false
    delta_values: false
  abb_l3_reactive_energy_meter:
    name: ABB L3 Reactive Energy Meter
    source: sensor.abb_reactive_energy_l3
    unique_id: abb_l3_reactive_energy_meter
    cycle: daily
    periodically_resetting: true
    net_consumption: false
    delta_values: false

