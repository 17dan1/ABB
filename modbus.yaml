# Configurazione dello slave ModBus del PMU ABB
  - name: ABB_PMU
    type: tcp
    host: 192.16.31.126
    port: 502
    
# Configurazione degli indirizzi
    sensors:
    
      - name: ABB Voltage L1-N
        unique_id: abb_voltage_L1-N
        slave: 1
        #scan_interval: 5
        address: 0x5B02
        input_type: holding
        unit_of_measurement: V
        device_class: voltage
        state_class: measurement
        scale: 0.1
        offset: 0
        precision: 1
        data_type: uint32
        
      - name: ABB Voltage L2-N
        unique_id: abb_voltage_L2-N
        slave: 1
        #scan_interval: 5
        address: 0x5B04
        input_type: holding
        unit_of_measurement: V
        device_class: voltage
        state_class: measurement
        scale: 0.1
        offset: 0
        precision: 1
        data_type: uint32
        
      - name: ABB Voltage L3-N
        unique_id: abb_voltage_L3-N
        slave: 1
        #scan_interval: 5
        address: 0x5B06
        input_type: holding
        unit_of_measurement: V
        device_class: voltage
        state_class: measurement
        scale: 0.1
        offset: 0
        precision: 1
        data_type: uint32
        
        
      - name: ABB Current L1
        unique_id: abb_current_L1
        slave: 1
        #scan_interval: 5
        address: 0x5B10
        input_type: holding
        unit_of_measurement: A
        device_class: current
        state_class: measurement
        scale: 0.01
        offset: 0
        precision: 1
        data_type: uint32
        
      - name: ABB Current L2
        unique_id: abb_current_L2
