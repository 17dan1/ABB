        address: 0x5B14
        input_type: holding
        unit_of_measurement: A
        device_class: current
        state_class: measurement
        scale: 0.01
        offset: 0
        precision: 1
        data_type: uint32
        

      - name: ABB Phase Voltage L1
        unique_id: abb_phase_voltage_L1
