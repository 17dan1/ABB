# Configurazione dello slave ModBus del PMU ABB
  - name: ABB_PMU
    type: tcp
    host: 192.168.188.44
    port: 502
    
# Configurazione degli indirizzi
    sensors:
    
      - name: ABB Voltage L1-N
        unique_id: abb_voltage_L1-N
        slave: 1
        #scan_interval: 5
        address: 0x5B02
        input_type: holding
        unit_of_measurement: V
        device_class: voltage
        state_class: measurement
        scale: 0.1
        offset: 0
        precision: 1
        data_type: uint32
        
      - name: ABB Voltage L2-N
        unique_id: abb_voltage_L2-N
        slave: 1
        #scan_interval: 5
        address: 0x5B04
        input_type: holding
        unit_of_measurement: V
        device_class: voltage
        state_class: measurement
        scale: 0.1
        offset: 0
        precision: 1
        data_type: uint32
        
      - name: ABB Voltage L3-N
        unique_id: abb_voltage_L3-N
